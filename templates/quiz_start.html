{% extends "base.html" %}
{% block content %}
<h1>Quiz</h1>

<div class="form-card">
    <form method="POST" action="/quiz/start">
        <label>How many words to review?</label>
        <input type="number" name="count" min="1" max="100" value="10" required>
        <button class="btn btn-primary" type="submit">Start Quiz</button>
    </form>
</div>
{% endblock %}
